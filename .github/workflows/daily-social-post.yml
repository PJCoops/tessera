name: Daily social post

on:
  # Primary trigger is Vercel Cron → /api/cron/daily-social, which fires
  # workflow_dispatch on this file at 07:17 UTC. GitHub's own schedule
  # is the redundant backup, set to an off-peak time so it survives
  # GH cron-stampede drops. The posting script checks a daily KV lock
  # at start and sets it after success, so the backup no-ops on days
  # the primary already posted.
  schedule:
    - cron: "41 13 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Capture screenshot + print copy, skip posting"
        required: false
        default: "false"
      only:
        description: "Comma-separated subset: x,bluesky,reddit,facebook,instagram"
        required: false
        default: "x,bluesky,facebook,instagram"
      force:
        description: "Bypass the daily idempotency lock"
        required: false
        default: "false"

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install posting deps
        # twitter-api-v2 for the X post; puppeteer for the screenshot used by
        # the Facebook (and eventually Reddit) image upload.
        run: npm install --no-save twitter-api-v2 puppeteer

      - name: Post
        env:
          PUZZLE_URL: https://tesserapuzzle.com/
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
          FORCE: ${{ github.event.inputs.force == 'true' && '1' || '0' }}
          ONLY: ${{ github.event.inputs.only || 'x,bluesky,facebook,instagram' }}
          APP_URL: https://tesserapuzzle.com
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: node scripts/daily-social-post/index.mjs
